<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Weather App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    .container {
        margin-top: 100px;
    }

    input {
        padding: 10px;
        border: none;
        border-radius: 5px;
        outline: none;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        background: #fff;
        color: #333;
        cursor: pointer;
        margin-left: 5px;
    }

    .weather-box {
        margin-top: 20px;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Weather App</h1>
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Get Weather</button>

    <div class="weather-box" id="weather"></div>
</div>

<script>
const apiKey = "YOUR_API_KEY";

// Small list of common cities to help with typos; extend as needed.
const cityList = [
    "Hyderabad","Mumbai","Delhi","Bengaluru","Chennai","Kolkata",
    "Pune","Ahmedabad","Jaipur","Lucknow","Kanpur","Nagpur"
];

function levenshtein(a, b) {
    if (!a.length) return b.length;
    if (!b.length) return a.length;
    const matrix = [];
    for (let i = 0; i <= b.length; i++) {
        matrix[i] = [i];
    }
    for (let j = 0; j <= a.length; j++) {
        matrix[0][j] = j;
    }
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1).toLowerCase() === a.charAt(j - 1).toLowerCase()) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1,
                    matrix[i][j - 1] + 1,
                    matrix[i - 1][j] + 1
                );
            }
        }
    }
    return matrix[b.length][a.length];
}

function findClosestCity(input) {
    if (!input) return null;
    let best = null;
    let bestDist = Infinity;
    for (const c of cityList) {
        const d = levenshtein(input.toLowerCase(), c.toLowerCase());
        if (d < bestDist) {
            bestDist = d;
            best = c;
        }
    }
    // allow small typo corrections only
    const threshold = Math.max(2, Math.floor(input.length / 4));
    return bestDist <= threshold ? best : null;
}

async function getWeather(overrideCity) {
    const city = (overrideCity || document.getElementById("city").value).trim();
    if (!city) {
        document.getElementById("weather").innerHTML = "Please enter a city name";
        return;
    }

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`;

    try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.cod !== 200) {
            const suggestion = findClosestCity(city);
            if (suggestion && suggestion.toLowerCase() !== city.toLowerCase()) {
                document.getElementById("weather").innerHTML = `City not found. Showing results for <strong>${suggestion}</strong>...`;
                document.getElementById("city").value = suggestion;
                return getWeather(suggestion);
            }
            document.getElementById("weather").innerHTML = "City not found";
            return;
        }

        const temp = data.main.temp;
        const desc = data.weather[0].description;
        const humidity = data.main.humidity;

        document.getElementById("weather").innerHTML = `
            <p><strong>${data.name}</strong></p>
            <p>🌡 Temp: ${temp} °C</p>
            <p>☁ Weather: ${desc}</p>
            <p>💧 Humidity: ${humidity}%</p>
        `;
    } catch (error) {
        document.getElementById("weather").innerHTML = "Error fetching data";
    }
}
</script>

</body>
</html>
